<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skate Journal</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-512.png">
    <meta name="theme-color" content="#000000">
</head>
<body>

<div id="splash-screen">
    <div class="splash-content">
        <h1 class="splash-title">SKATE</h1>
        <h2 class="splash-subtitle">JOURNAL</h2>
        <p class="splash-text">SKATE MORE. PROGRESS EVERY DAY.</p>

        <div class="kickflip-area">
            <div class="ollie-board">🛹</div>
        </div>

        <p class="loading-text">CARICAMENTO...</p>

        <div class="loading-bar">
            <div class="loading-progress">
                <span class="loading-skate">🛹</span>
            </div>
        </div>
    </div>
</div>

<nav class="topbar">
    <div class="brand">
        <div class="logo">🛹</div>
        <div>
            <h1>SKATE JOURNAL</h1>
            <p>Trick, progressi, sessioni, obiettivi.</p>
        </div>
    </div>

    <div class="nav-buttons">
        <button onclick="window.location.href='index.html'">🏠<span>Home</span></button>
        <button onclick="window.location.href='sessioni.html'">🛹<span>Sessioni</span></button>
        <button onclick="window.location.href='calendario.html'">📆<span>Calendario</span></button>
        <button onclick="window.location.href='statistiche.html'">📊<span>Stats</span></button>
        <button onclick="window.location.href='obiettivi.html'">🎯<span>Obiettivi</span></button>
        <button onclick="window.location.href='consigli.html'">💡<span>Consigli</span></button>
        <button onclick="window.location.href='badge.html'">🏅<span>Badge</span></button>
    </div>
</nav>

<main class="app">

    <section class="card">
        <h2>📊 Riepilogo</h2>
        <div id="riepilogoTrick" class="stats-grid">
            Nessun trick inserito ancora.
        </div>
    </section>

    <section class="card">
        <h2>🛹 Aggiungi nuovo trick</h2>

        <div class="form-grid">
            <div>
                <label>Nome Trick</label>
                <input type="text" id="nomeTrick" placeholder="Es. Kickflip">
            </div>

            <div>
                <label>Categoria</label>
                <select id="categoriaTrick">
                    <option>Flatground</option>
                    <option>Manual</option>
                    <option>Grind / Slide</option>
                    <option>Rampa</option>
                    <option>Altro</option>
                </select>
            </div>

            <div>
                <label>Stato</label>
                <select id="statoTrick">
                    <option>Da provare</option>
                    <option>In allenamento</option>
                    <option>Quasi chiuso</option>
                    <option>Chiuso</option>
                    <option>Da perfezionare</option>
                </select>
            </div>

            <div>
                <label>Tentativi</label>
                <input type="number" id="tentativi" placeholder="Es. 10">
            </div>

            <div>
                <label>Chiusure</label>
                <input type="number" id="chiusure" placeholder="Es. 3">
            </div>

            <div class="button-box">
                <button class="main-btn" onclick="aggiungiTrick()">＋ Aggiungi Trick</button>
            </div>
        </div>
    </section>

    <section class="card">
        <h2>🔍 Cerca Trick</h2>
        <input type="text" id="ricercaTrick" placeholder="Cerca un trick..." onkeyup="mostraTricks()">
    </section>

    <section class="card">
        <h2>☰ I tuoi trick</h2>
        <div id="listaTrick"></div>
    </section>

</main>

<footer>
    <h3>🛹 Skate more. Progress every day.</h3>
    <p>Created by @Daniele Pischedda</p>
</footer>

<script src="script.js"></script>

<script>
window.addEventListener("load", function () {
    setTimeout(function () {
        document.getElementById("splash-screen").classList.add("hide-splash");
    }, 2600);
});

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./service-worker.js")
        .then(() => console.log("Service Worker registrato"))
        .catch(err => console.log("Errore SW:", err));
}
</script>

</body>
</html>
